# Dokploy / Nixpacks build for an Astro static site.
# Build produces ./dist which Dokploy serves via its static handler.

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "echo 'static build complete'"

[staticAssets]
distDir = "dist"
