server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Astro emits per-route index.html (e.g. /posts/hello-world/index.html).
  # try_files lets `/posts/hello-world` and `/posts/hello-world/` both resolve.
  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  # Long-cache hashed asset bundles under /_astro/.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  error_page 404 /404.html;
}
